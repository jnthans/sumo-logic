  - id: only_show_deleted
    label: 'Only Show Deleted'
    type: checkbox
    required: false
  - id: page
    label: 'Page'
    type: number
    required: false
  - id: page_size
    label: 'Page Size'
    type: number
    required: false
  - id: sort_direction
    label: 'Sort Direction (by Created Date)'
    type: list
    required: false
    values:
      Descending: 'Descending'
      Ascending: 'Ascending'
