description: 'Analyst-initiated account takeover (ATO) identity containment: validate the target user in Azure AD, gate on analyst approval, then revoke Azure AD sign-in sessions, reset the on-prem Active Directory password (synced to Azure AD and Google Workspace), and suspend/re-enable the Google Workspace account to invalidate Google sessions. Finishes with a documentation/handoff task.'
